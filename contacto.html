<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contacto · Sonia Barber Psicología</title>
<link rel="icon" type="image/png" href="images/logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#FAF8F5;--cream-dark:#F3EFE9;--taupe:#C8B8A8;--taupe-light:#EDE5DC;--taupe-mid:#D9CEC3;--garnet:#6B1F2A;--garnet-light:#8B2F3F;--text:#2E2926;--text-light:#8A7E78}
body{background:var(--cream);color:var(--text);font-family:'Montserrat',sans-serif;font-weight:300}
.contact-page{max-width:640px;margin:0 auto;padding:120px 24px 80px}
.back{display:inline-block;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--garnet);text-decoration:none;margin-bottom:40px;font-weight:500;transition:opacity .3s}
.back:hover{opacity:.7}
.contact-title{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;color:var(--text);margin-bottom:8px}
.contact-title em{font-style:italic;color:var(--garnet)}
.contact-sub{font-size:.8rem;color:var(--text-light);line-height:1.9;margin-bottom:48px}
.form-group{margin-bottom:24px}
.form-label{display:block;font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-light);margin-bottom:8px;font-weight:500}
.form-input,.form-textarea{width:100%;padding:14px 16px;border:1px solid var(--taupe-light);border-radius:4px;background:var(--cream);font-family:'Montserrat',sans-serif;font-size:.8rem;font-weight:300;color:var(--text);transition:border-color .3s;outline:none}
.form-input:focus,.form-textarea:focus{border-color:var(--garnet)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--taupe)}
.form-textarea{resize:vertical;min-height:140px}
.form-btn{display:inline-block;background:var(--garnet);color:#fff;border:none;font-family:'Montserrat',sans-serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;padding:16px 40px;border-radius:2px;cursor:pointer;transition:all .3s;font-weight:500;margin-top:8px}
.form-btn:hover{background:var(--garnet-light);transform:translateY(-1px);box-shadow:0 8px 28px rgba(107,31,42,.18)}
.divider{width:36px;height:1px;background:var(--garnet);margin:48px 0 32px}
.redes-title{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--garnet);margin-bottom:20px;font-weight:500}
.redes-grid{display:flex;gap:24px;align-items:center}
.redes-link{display:flex;align-items:center;gap:10px;text-decoration:none;transition:opacity .3s}
.redes-link:hover{opacity:.7}
.redes-link svg{width:22px;height:22px;stroke:var(--garnet);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.redes-link span{font-size:.72rem;color:var(--text-light);font-weight:400}
</style>
</head>
<body>
<div class="contact-page">
  <a href="index.html" class="back">← Volver a la web</a>
  <h1 class="contact-title">Hablemos.<br/><em>Estoy aquí para ayudarte.</em></h1>
  <p class="contact-sub">Rellena el formulario y me pondré en contacto contigo lo antes posible.</p>

  <form action="https://formsubmit.co/sbarberpsicologia@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="Formulario Contacto Web"/>
    <input type="hidden" name="_captcha" value="false"/>
    <input type="hidden" name="_next" value="https://antpeacor.github.io/soniabarber.psicologa/"/>
    <input type="hidden" name="_template" value="table"/>

    <div class="form-group">
      <label class="form-label" for="nombre">Nombre *</label>
      <input class="form-input" type="text" id="nombre" name="nombre" placeholder="Tu nombre" required/>
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email *</label>
      <input class="form-input" type="email" id="email" name="email" placeholder="tu@email.com" required/>
    </div>
    <div class="form-group">
      <label class="form-label" for="telefono">Teléfono *</label>
      <input class="form-input" type="tel" id="telefono" name="telefono" placeholder="+34 600 000 000" required/>
    </div>
    <div class="form-group">
      <label class="form-label" for="mensaje">Mensaje *</label>
      <textarea class="form-textarea" id="mensaje" name="mensaje" placeholder="Cuéntame qué necesitas..." required></textarea>
    </div>
    <button type="submit" class="form-btn">Enviar mensaje</button>
  </form>

  <div class="divider"></div>

  <p class="redes-title">Redes</p>
  <div class="redes-grid">
    <a href="https://www.instagram.com/soniabarber.psicologia/" target="_blank" rel="noopener" class="redes-link">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2"/></svg>
      <span>Instagram</span>
    </a>
    <a href="https://www.linkedin.com/in/sonia-barber-belda-016221292/" target="_blank" rel="noopener" class="redes-link">
      <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      <span>LinkedIn</span>
    </a>
    <a href="https://wa.link/8j01d1" target="_blank" rel="noopener" class="redes-link">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.955 9.955 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
      <span>WhatsApp</span>
    </a>
    <a href="https://www.tiktok.com/@soniabarber.psicologia" target="_blank" rel="noopener" class="redes-link">
      <svg viewBox="0 0 24 24"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
      <span>TikTok</span>
    </a>
  </div>
</div>
</body>
</html>
